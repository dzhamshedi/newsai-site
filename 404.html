<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="noindex" />
    <title>Страница не найдена — NewsAI</title>
    <meta
      name="description"
      content="Страница NewsAI не найдена. Вернитесь на главную страницу ежедневного AI-дайджеста."
    />
    <link rel="canonical" href="https://dzhamshedi.github.io/newsai-site/" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="error-page">
    <main class="error-shell">
      <a class="brand" href="https://dzhamshedi.github.io/newsai-site/" aria-label="NewsAI">
        <span class="brand-mark" aria-hidden="true">N</span>
        <span class="brand-copy">
          <strong>NewsAI</strong>
          <span>daily intelligence</span>
        </span>
      </a>

      <section class="error-copy" aria-labelledby="error-title">
        <p class="eyebrow">404</p>
        <h1 id="error-title">Такой страницы нет</h1>
        <p class="lead">
          Возможно, выпуск был перемещен или ссылка набрана с ошибкой. Главная страница дайджеста
          уже на месте.
        </p>
        <a class="source-link" href="https://dzhamshedi.github.io/newsai-site/">На главную</a>
      </section>
    </main>
  </body>
</html>
